name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm eval:fixtures
      - run: pnpm build
      - name: Build production image
        run: docker build --build-arg GIT_REVISION="$GITHUB_SHA" --build-arg BUILD_DATE="$(date -u +%FT%TZ)" -t careguide:${GITHUB_SHA} .
      - name: Scan image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: careguide:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=chromium
