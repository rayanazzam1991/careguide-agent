x-runtime: &runtime
  image: careguide:${IMAGE_TAG:-local}
  build:
    context: .
    target: runtime
    args:
      GIT_REVISION: ${GIT_REVISION:-local}
      BUILD_DATE: ${BUILD_DATE:-unknown}
  env_file:
    - ${ENV_FILE:-.env.production}
  restart: unless-stopped
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  pids_limit: 160
  networks:
    - careguide
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  app:
    <<: *runtime
    container_name: careguide-app
    ports:
      - "127.0.0.1:${APP_PORT:-7100}:3000"
    cpus: 1.0
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    <<: *runtime
    container_name: careguide-worker
    command: ["node", ".output/worker/index.mjs"]
    cpus: 0.5
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 3

  migrate:
    image: careguide-migrate:${IMAGE_TAG:-local}
    profiles: ["tools"]
    build:
      context: .
      target: tooling
    env_file:
      - ${ENV_FILE:-.env.production}
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/supabase/.temp:size=8m,mode=0700
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    networks: [careguide]

networks:
  careguide:
    name: careguide-network
    driver: bridge
